name: Release Windows CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM with winget
        shell: pwsh
        run: |
          winget install --id LLVM.LLVM --exact --accept-source-agreements --accept-package-agreements --silent
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Verify toolchain
        shell: pwsh
        run: |
          cargo --version
          cmake --version
          clang --version

      - name: Build CLI
        working-directory: cli
        shell: pwsh
        run: cargo build --release

      - name: Prepare release artifact
        shell: pwsh
        run: |
          Copy-Item "cli/target/release/cheatcode.exe" "cheatcode-windows-x86_64.exe"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: cheatcode-windows-x86_64.exe
          generate_release_notes: true
