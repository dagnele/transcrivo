name: Build Windows CLI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-cli-windows.yml'
      - 'cli/**'
  pull_request:
    paths:
      - '.github/workflows/build-cli-windows.yml'
      - 'cli/**'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM with winget
        shell: pwsh
        run: |
          winget install --id LLVM.LLVM --exact --accept-source-agreements --accept-package-agreements --silent
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Verify toolchain
        shell: pwsh
        run: |
          cargo --version
          cmake --version
          clang --version

      - name: Build CLI
        working-directory: cli
        shell: pwsh
        run: cargo build --release

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheatcode-windows
          path: cli/target/release/cheatcode.exe
