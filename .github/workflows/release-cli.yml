name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-artifact:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            os: windows
            backend: cpu
            features: ""
            artifact_name: transcrivo-windows-x86_64-cpu.exe
            artifact_upload_name: release-windows-cpu
          - runner: windows-latest
            os: windows
            backend: vulkan
            features: --features whisper-gpu-vulkan
            artifact_name: transcrivo-windows-x86_64-vulkan.exe
            artifact_upload_name: release-windows-vulkan
          - runner: windows-latest
            os: windows
            backend: cuda
            features: --features whisper-gpu-cuda
            artifact_name: transcrivo-windows-x86_64-cuda.exe
            artifact_upload_name: release-windows-cuda
          - runner: ubuntu-latest
            os: linux
            backend: cpu
            features: ""
            artifact_name: transcrivo-linux-x86_64-cpu
            artifact_upload_name: release-linux-cpu
          - runner: ubuntu-latest
            os: linux
            backend: vulkan
            features: --features whisper-gpu-vulkan
            artifact_name: transcrivo-linux-x86_64-vulkan
            artifact_upload_name: release-linux-vulkan
          - runner: ubuntu-latest
            os: linux
            backend: cuda
            features: --features whisper-gpu-cuda
            artifact_name: transcrivo-linux-x86_64-cuda
            artifact_upload_name: release-linux-cuda

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux base dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config cmake clang libpipewire-0.3-dev libspa-0.2-dev

      - name: Install Linux Vulkan dependencies
        if: matrix.os == 'linux' && matrix.backend == 'vulkan'
        run: |
          sudo apt-get install -y libvulkan-dev

      - name: Install Linux CUDA dependencies
        if: matrix.os == 'linux' && matrix.backend == 'cuda'
        run: |
          sudo apt-get install -y nvidia-cuda-toolkit
          if ! command -v nvcc >/dev/null 2>&1; then
            echo "CUDA compiler not found after installing nvidia-cuda-toolkit." >&2
            exit 1
          fi
          nvcc_bin="$(command -v nvcc)"
          nvcc_path="$(readlink -f "$nvcc_bin")"
          if [ -z "$nvcc_path" ] || [ ! -e "$nvcc_path" ]; then
            echo "Failed to resolve a valid nvcc path from '$nvcc_bin'." >&2
            exit 1
          fi
          cuda_root="$(dirname "$(dirname "$nvcc_path")")"
          if [ ! -d "$cuda_root" ]; then
            echo "Resolved CUDA root '$cuda_root' from '$nvcc_path' does not exist." >&2
            exit 1
          fi
          echo "CUDA_PATH=$cuda_root" >> "$GITHUB_ENV"
          echo "CUDA_HOME=$cuda_root" >> "$GITHUB_ENV"
          echo "CUDAToolkit_ROOT=$cuda_root" >> "$GITHUB_ENV"
          echo "CUDA_TOOLKIT_ROOT_DIR=$cuda_root" >> "$GITHUB_ENV"
          echo "$cuda_root/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM with winget
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          winget install --id LLVM.LLVM --exact --accept-source-agreements --accept-package-agreements --silent
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Install Vulkan SDK with winget
        if: matrix.os == 'windows' && matrix.backend == 'vulkan'
        shell: pwsh
        run: |
          winget install --id KhronosGroup.VulkanSDK --exact --accept-source-agreements --accept-package-agreements --silent
          $vulkanSdk = Get-ChildItem "C:\VulkanSDK" | Sort-Object Name -Descending | Select-Object -First 1
          echo "VULKAN_SDK=$($vulkanSdk.FullName)" >> $env:GITHUB_ENV
          echo "$($vulkanSdk.FullName)\Bin" >> $env:GITHUB_PATH

      - name: Install CUDA toolkit with winget
        if: matrix.os == 'windows' && matrix.backend == 'cuda'
        shell: pwsh
        run: |
          winget install --id Nvidia.CUDA --exact --accept-source-agreements --accept-package-agreements --silent
          $cudaRoot = Get-ChildItem "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA" | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $cudaRoot) {
            throw "CUDA toolkit installation did not produce a toolkit directory in C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA."
          }
          echo "CUDA_PATH=$($cudaRoot.FullName)" >> $env:GITHUB_ENV
          echo "CUDA_HOME=$($cudaRoot.FullName)" >> $env:GITHUB_ENV
          echo "CUDAToolkit_ROOT=$($cudaRoot.FullName)" >> $env:GITHUB_ENV
          echo "CUDA_TOOLKIT_ROOT_DIR=$($cudaRoot.FullName)" >> $env:GITHUB_ENV
          echo "CudaToolkitDir=$($cudaRoot.FullName)" >> $env:GITHUB_ENV
          echo "$($cudaRoot.FullName)\bin" >> $env:GITHUB_PATH
          echo "$($cudaRoot.FullName)\libnvvp" >> $env:GITHUB_PATH

      - name: Verify CUDA toolkit on Linux
        if: matrix.os == 'linux' && matrix.backend == 'cuda'
        run: |
          nvcc --version
          if [ ! -d "$CUDAToolkit_ROOT" ]; then
            echo "CUDAToolkit_ROOT is not set or points to a non-existent toolkit directory." >&2
            exit 1
          fi

      - name: Verify CUDA toolkit on Windows
        if: matrix.os == 'windows' && matrix.backend == 'cuda'
        shell: pwsh
        run: |
          nvcc --version
          if (-not (Test-Path $env:CudaToolkitDir)) {
            throw "CudaToolkitDir environment variable is not set or points to a non-existent toolkit directory."
          }

      - name: Verify toolchain on Linux
        if: matrix.os == 'linux'
        run: |
          cargo --version
          cmake --version
          clang --version

      - name: Verify toolchain on Windows
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          cargo --version
          cmake --version
          clang --version

      - name: Build CLI on Linux
        if: matrix.os == 'linux'
        working-directory: cli
        run: cargo build --release ${{ matrix.features }}

      - name: Build CLI on Windows
        if: matrix.os == 'windows'
        working-directory: cli
        shell: pwsh
        env:
          CARGO_TARGET_DIR: C:\t
        run: cargo build --release ${{ matrix.features }}

      - name: Prepare Linux release artifact
        if: matrix.os == 'linux'
        run: |
          cp cli/target/release/transcrivo ${{ matrix.artifact_name }}

      - name: Prepare Windows release artifact
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          CARGO_TARGET_DIR: C:\t
        run: |
          Copy-Item "$env:CARGO_TARGET_DIR/release/transcrivo.exe" "${{ matrix.artifact_name }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_upload_name }}
          path: ${{ matrix.artifact_name }}

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-artifact

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/release-windows-cpu/transcrivo-windows-x86_64-cpu.exe
            release-artifacts/release-windows-vulkan/transcrivo-windows-x86_64-vulkan.exe
            release-artifacts/release-windows-cuda/transcrivo-windows-x86_64-cuda.exe
            release-artifacts/release-linux-cpu/transcrivo-linux-x86_64-cpu
            release-artifacts/release-linux-vulkan/transcrivo-linux-x86_64-vulkan
            release-artifacts/release-linux-cuda/transcrivo-linux-x86_64-cuda
          generate_release_notes: true
