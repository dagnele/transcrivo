name: Release CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM with winget
        shell: pwsh
        run: |
          winget install --id LLVM.LLVM --exact --accept-source-agreements --accept-package-agreements --silent
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Verify toolchain
        shell: pwsh
        run: |
          cargo --version
          cmake --version
          clang --version

      - name: Build CLI
        working-directory: cli
        shell: pwsh
        run: cargo build --release

      - name: Prepare release artifact
        shell: pwsh
        run: |
          Copy-Item "cli/target/release/cheatcode.exe" "cheatcode-windows-x86_64.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: cheatcode-windows-x86_64.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config cmake clang libpipewire-0.3-dev libspa-0.2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify toolchain
        run: |
          cargo --version
          cmake --version
          clang --version

      - name: Build CLI
        working-directory: cli
        run: cargo build --release

      - name: Prepare release artifact
        run: |
          cp cli/target/release/cheatcode cheatcode-linux-x86_64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: cheatcode-linux-x86_64

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/release-windows/cheatcode-windows-x86_64.exe
            release-artifacts/release-linux/cheatcode-linux-x86_64
          generate_release_notes: true
